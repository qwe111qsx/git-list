<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Git List · 支持</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7f9;
      --card: #fff;
      --text: #1a1a1a;
      --muted: #5c5c5c;
      --accent: #f9a825;
      --border: rgba(0, 0, 0, 0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --card: #1e1e1e;
        --text: #f0f0f0;
        --muted: #b0b0b0;
        --border: rgba(255, 255, 255, 0.12);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    .lead {
      margin: 0 0 1.75rem;
      color: var(--muted);
      font-size: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.25rem;
    }
    figure {
      margin: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }
    figure img {
      display: block;
      width: 100%;
      max-width: 280px;
      height: auto;
      margin: 0 auto;
      border-radius: 8px;
    }
    figcaption {
      margin-top: 0.75rem;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .tag {
      display: inline-block;
      margin-top: 0.35rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
    }
    footer {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>Git List</h1>
    <p class="lead">若本扩展对你有帮助，欢迎通过下方二维码打赏支持后续开发与维护。感谢。</p>
    <div class="grid">
      <figure>
        <img src="../media/wechat.png" width="512" height="512" alt="微信收款码" />
        <figcaption>微信</figcaption>
        <span class="tag">WeChat</span>
      </figure>
      <figure>
        <img src="../media/alipay.png" width="512" height="512" alt="支付宝收款码" />
        <figcaption>支付宝</figcaption>
        <span class="tag">Alipay</span>
      </figure>
    </div>
    <footer>也可在 VS Code 中通过命令面板执行「Git List: 打开支持页面」再次打开本页。</footer>
  </main>
</body>
</html>
